<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body style="background:var(--tce-blue); display:flex; align-items:center; justify-content:center; height:100vh;">
    <div class="card" style="width:400px; text-align:center;">
        <h2>Portal Login</h2>
        <p style="font-size:0.8rem; margin-bottom:20px;">Sample: student@tce.edu | admin@tce.edu</p>
        <input type="email" id="l-email" placeholder="Institutional Email" class="form-input">
        <select id="l-role" class="form-input">
            <option value="student">Student</option>
            <option value="volunteer">Volunteer</option>
            <option value="admin">Administrator</option>
        </select>
        <button class="btn-portal" onclick="auth()">Sign In</button>
    </div>
    <script>
        function auth() {
            const email = $('#l-email').val();
            if(email.endsWith('@tce.edu')) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userRole', $('#l-role').val());
                window.location.href = 'index.html';
            } else { alert("Please use @tce.edu email"); }
        }
    </script>
</body>
</html>
