<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TCE EventHub</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

    <nav>
        <div class="logo" onclick="showPage('home')">TCE.<span>EventHub</span></div>
        <ul class="nav-links">
            <li class="public" onclick="showPage('home')">Home</li>
            <li class="public" onclick="showPage('events')">Events</li>
            <li id="nav-dash" onclick="showPage('dashboard')">My Events</li>
            <li id="nav-scan" onclick="showPage('scanner')">Scanner</li>
            <li id="nav-admin" onclick="showPage('admin')">Admin Hub</li>
            <li id="nav-logout" style="color:var(--danger)" onclick="logout()">Logout</li>
        </ul>
    </nav>

    <section id="home" class="page" style="display:block;">
        <h1>Welcome to <span style="color:var(--tce-orange)">EventHub</span></h1>
        <p>Discover and Manage TCE Campus Events</p>
        
        <div class="stats-container" style="margin: 40px auto;">
            <h3>Department Engagement (Live)</h3>
            <div id="home-rankings"></div>
        </div>

        <div id="login-cta">
            <button class="btn-portal" style="width:auto; padding:15px 40px;" onclick="location.href='login.html'">Login to Register</button>
        </div>
    </section>

    <section id="events" class="page">
        <h2>Live Event Feed</h2>
        <div class="event-grid" id="event-feed"></div>
    </section>

    <section id="admin" class="page">
        <div class="card" style="max-width:450px; margin:auto;">
            <h3>Post New Event</h3>
            <input type="text" id="a-title" placeholder="Event Name" class="form-input">
            <select id="a-dept" class="form-input">
                <option value="IT">IT Dept</option>
                <option value="CSE">CSE Dept</option>
                <option value="ECE">ECE Dept</option>
            </select>
            <button class="btn-portal" onclick="addEvent()">Publish to Students</button>
        </div>
    </section>

    <section id="scanner" class="page">
        <div class="scanner-box">
            <div class="cam-view"><div class="laser-line"></div></div>
            <input type="text" id="s-id" placeholder="Scan Student ID" class="form-input" style="margin-top:20px;">
            <button class="btn-portal" onclick="alert('Attendance Logged!')">Confirm Entry</button>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
