<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>Admin Dashboard</h2>

<h3>Create / Edit Event</h3>

<form id="eventForm">
<input type="hidden" id="editIndex">

<input type="text" id="eName" placeholder="Event Name">
<small class="error"></small>

<input type="date" id="eDate">
<small class="error"></small>

<input type="text" id="eLocation" placeholder="Location">
<small class="error"></small>

<textarea id="eDesc" placeholder="Description"></textarea>
<small class="error"></small>

<input type="number" id="eLimit" placeholder="Maximum Seats">
<small class="error"></small>

<button type="submit">Save Event</button>
<div class="success" id="eventSuccess"></div>
</form>

<hr style="margin:20px 0">

<h3>All Events</h3>
<div id="adminEventList"></div>

<hr style="margin:20px 0">

<h3>Dashboard Stats</h3>
<p>Total Events: <span id="totalEvents">0</span></p>
<p>Total Students: <span id="totalStudents">0</span></p>
<p>Total Volunteers: <span id="totalVolunteers">0</span></p>
<p>Total Registrations: <span id="totalRegistrations">0</span></p>

</div>

<script src="script.js"></script>
</body>
</html>
