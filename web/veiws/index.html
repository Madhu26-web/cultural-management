<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventPro | Mini Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --success: #22c55e; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; padding: 40px 20px; }
        .card { background: white; width: 100%; max-width: 450px; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; font-weight: 700; color: var(--primary); }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; font-weight: 500; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; transition: 0.3s; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .secondary-btn { background: transparent; color: var(--primary); margin-top: 10px; border: 1px solid var(--primary); }
        
        /* Event List Styling */
        .event-item { background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #edf2f7; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .tag { font-size: 0.75rem; padding: 4px 8px; border-radius: 20px; background: #e0e7ff; color: var(--primary); font-weight: 700; }
        .hidden { display: none; }
        .user-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div id="authSection">
        <h2 id="authTitle">Create Account</h2>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="johndoe">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="john@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button onclick="handleAuth()" id="mainAuthBtn">Sign Up</button>
        <button class="secondary-btn" onclick="toggleAuthMode()" id="switchBtn">Already have an account? Login</button>
    </div>

    <div id="appSection" class="hidden">
        <div class="user-header">
            <span id="welcomeMsg">Welcome!</span>
            <button onclick="logout()" style="width: auto; padding: 5px 10px; font-size: 0.8rem; background: #ef4444;">Logout</button>
        </div>
        
        <h2>Create Event</h2>
        <div class="form-group">
            <input type="text" id="eventTitle" placeholder="Event Name">
        </div>
        <div class="form-group">
            <input type="text" id="eventVenue" placeholder="Venue Location">
        </div>
        <div class="form-group">
            <select id="eventCategory">
                <option value="Workshop">Workshop</option>
                <option value="Social">Social</option>
                <option value="Meeting">Meeting</option>
            </select>
        </div>
        <button onclick="addEvent()" style="background: var(--success);">Post Event</button>

        <h3 style="margin-top: 2rem;">Timeline</h3>
        <div id="eventList"></div>
    </div>
</div>

<script>
    const API_BASE = "http://localhost:5000/api";
    let isLoginMode = false;

    // --- AUTH LOGIC ---
    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('authTitle').innerText = isLoginMode ? "Welcome Back" : "Create Account";
        document.getElementById('username').parentElement.classList.toggle('hidden', isLoginMode);
        document.getElementById('mainAuthBtn').innerText = isLoginMode ? "Login" : "Sign Up";
        document.getElementById('switchBtn').innerText = isLoginMode ? "New here? Register" : "Already have an account? Login";
    }

    async function handleAuth() {
        const endpoint = isLoginMode ? '/users/login' : '/users/register';
        const payload = {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            ...(isLoginMode ? {} : { username: document.getElementById('username').value })
        };

        try {
            const res = await fetch(API_BASE + endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();

            if (res.ok) {
                if (isLoginMode) {
                    localStorage.setItem('user', data.username);
                    checkAuth();
                } else {
                    alert("Registration successful! Please login.");
                    toggleAuthMode();
                }
            } else {
                alert(data.message);
            }
        } catch (err) { console.error(err); }
    }

    // --- EVENT LOGIC ---
    async function addEvent() {
        const payload = {
            title: document.getElementById('eventTitle').value,
            venue: document.getElementById('eventVenue').value,
            category: document.getElementById('eventCategory').value
        };

        const res = await fetch(API_BASE + '/events', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            document.getElementById('eventTitle').value = "";
            loadEvents();
        }
    }

    async function loadEvents() {
        const res = await fetch(API_BASE + '/events');
        const events = await res.json();
        const container = document.getElementById('eventList');
        container.innerHTML = events.map(e => `
            <div class="event-item">
                <div>
                    <div style="font-weight:700">${e.title}</div>
                    <div style="font-size:0.8rem; color:#64748b">${e.venue}</div>
                </div>
                <span class="tag">${e.category}</span>
            </div>
        `).join('');
    }

    // --- UTILS ---
    function checkAuth() {
        const user = localStorage.getItem('user');
        if (user) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            document.getElementById('welcomeMsg').innerText = `Hi, ${user}!`;
            loadEvents();
        }
    }

    function logout() {
        localStorage.removeItem('user');
        location.reload();
    }

    // Init
    checkAuth();
</script>

</body>
</html>
