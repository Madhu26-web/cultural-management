<!DOCTYPE html>
<html>
<head>
<title>Volunteer Register</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h2>Volunteer Registration</h2>
<form id="volunteerForm">
<input type="text" id="vName" placeholder="Full Name">
<small class="error"></small>

<input type="email" id="vEmail" placeholder="Email">
<small class="error"></small>

<input type="password" id="vPass" placeholder="Password">
<small class="error"></small>

<button type="submit">Register</button>
<div class="success" id="vSuccess"></div>
</form>
</div>

<script src="script.js"></script>
</body>
</html>
