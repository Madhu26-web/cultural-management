<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="style.css"></head>
<body style="display:flex; justify-content:center; align-items:center; height:100vh; background: var(--tce-blue);">
    <div class="card" style="width:360px; text-align:center; border:none; box-shadow: 0 25px 50px rgba(0,0,0,0.3);">
        <h2 style="margin-bottom:10px;">Portal Login</h2>
        <p style="color:var(--text-muted); font-size:0.8rem; margin-bottom:25px;">Enter your TCE credentials</p>
        <input type="email" id="email" placeholder="Email (@tce.edu)" class="form-input">
        <select id="role" class="form-input">
            <option value="student">Student</option>
            <option value="volunteer">Volunteer</option>
            <option value="admin">Admin</option>
        </select>
        <button class="btn-portal" style="width:100%; margin-top:10px;" onclick="doLogin()">Sign In</button>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        function doLogin() {
            const email = $('#email').val();
            if(email.includes('@tce.edu')) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userRole', $('#role').val());
                window.location.href = 'index.html';
            } else { alert("Use TCE email"); }
        }
    </script>
</body>
</html>
